<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bevy Engine</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #canvas-parent {
        position: fixed;
        inset: 0;
      }
      #mygame-canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
    <!-- media libs the wasm expects as globals (LivekitClient, Hls) — same as the old boot page -->
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1" crossorigin="anonymous"></script>
  </head>
  <body>
    <div id="canvas-parent">
      <canvas id="mygame-canvas"></canvas>
    </div>
    <!-- gpu_cache.js flips this to flex while shaders compile; empty = no visual (host UI owns overlays) -->
    <div id="shader-compiling" style="display: none"></div>
    <script type="module" src="/src/engine-host.ts"></script>
  </body>
</html>
